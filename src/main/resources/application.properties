spring.application.name=xianglian-web

# 数据源
spring.datasource.url=jdbc:mysql://mysql7.sqlpub.com:3312/xianglian?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=xianglian_user
spring.datasource.password=gBNZk1N4Xm5yhIu0
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.type-aliases-package=com.xianglian.pojo
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 服务器配置
server.port=8080
server.servlet.context-path=/

# 日志配置
logging.level.com.xianglian=info

# JWT配置
jwt.secret=${JWT_SECRET:xianglian_default_secret_key_for_development_only}
jwt.expiration=86400000

# Knife4j配置
knife4j.enable=true
knife4j.production=false
knife4j.basic.enable=false

# AI服务配置
ai.provider.type=deepseek

# 豆包API配置（通过环境变量注入）
ai.provider.doubao.api-key=${DOUBAO_API_KEY:}
ai.provider.doubao.secret-key=${DOUBAO_SECRET_KEY:}
ai.provider.doubao.max-tokens=1500
ai.provider.doubao.temperature=0.7

# 通义千问API配置（通过环境变量注入）
ai.provider.tongyi.api-key=${TONGYI_API_KEY:}
ai.provider.tongyi.max-tokens=1500
ai.provider.tongyi.temperature=0.7

# DeepSeek API配置（通过环境变量注入）
ai.provider.deepseek.api-key=${DEEPSEEK_API_KEY:}
ai.provider.deepseek.max-tokens=1500
ai.provider.deepseek.temperature=0.7
ai.provider.deepseek.model=deepseek-chat

# 缓存配置
ai.cache.enabled=true
ai.cache.expire-minutes=30

# 限流配置
ai.rate-limit.max-requests-per-minute=30
ai.rate-limit.max-requests-per-day=1000
